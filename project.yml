name: DaNiangao
options:
  bundleIdPrefix: com.daniangao
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: DaNiangao
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO

targets:
  DaNiangao:
    type: application
    platform: macOS
    sources:
      - path: DaNiangao
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daniangao.gamemac
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: "打年糕"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.games"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2024 DaNiangao. All rights reserved."
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    entitlements:
      path: DaNiangao/DaNiangao.entitlements
      properties:
        com.apple.security.app-sandbox: false